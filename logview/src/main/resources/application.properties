spring.application.name=logview
server.port=8080

spring.data.mongodb.uri=mongodb://localhost:27017/logview

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logview.upload.allowed-extension=.log
logview.upload.max-size=10485760
logview.storage.temp-dir=${java.io.tmpdir}/logview/uploads
